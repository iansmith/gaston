# Meson cross-file: build picolibc for ARM64 Linux using gaston as the C compiler.
#
# Usage (inside container):
#   meson setup builddir \
#     --cross-file /gaston-cross/gaston-aarch64.ini \
#     -Dprefix=/output \
#     -Dincludedir=/output/include \
#     -Dlibdir=/output/lib \
#     -Dmultilib=false \
#     -Dpicolib=false \
#     -Dpicocrt=false \
#     -Dnewlib-tinystdio=true \
#     -Dposix-console=true

[binaries]
c = '/usr/local/bin/gaston'
ar = 'ar'
strip = 'strip'

[host_machine]
system = 'linux'
cpu_family = 'aarch64'
cpu = 'aarch64'
endian = 'little'

[properties]
needs_exe_wrapper = true
